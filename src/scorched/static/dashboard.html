<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADEBOT // DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080a0d;
    --surface:   #0c1016;
    --surface-2: #111820;
    --border:    #1c2838;
    --border-2:  #2a3d52;
    --text:      #b0c4d8;
    --text-dim:  #5e7a94;
    --text-hi:   #e4eef8;
    --amber:     #e8a030;
    --amber-dim: #7a5018;
    --amber-glow:rgba(232,160,48,0.08);
    --green:     #22c55e;
    --green-dim: #0f4d2a;
    --green-glow:rgba(34,197,94,0.08);
    --red:       #ef4444;
    --red-dim:   #5a1818;
    --red-glow:  rgba(239,68,68,0.06);
    --blue:      #3b82f6;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    zoom: 1.4;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ---- TOPBAR ---- */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 0;
  }
  /* Logo + status — fixed left anchor */
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .logo {
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 300; }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Nav links — centered in remaining space */
  .topbar-nav {
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
  }
  .nav-link {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 10px;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--text-hi); }
  .nav-link.active {
    color: var(--amber);
    border-bottom-color: var(--amber);
  }

  /* Operational status cluster — right side */
  .topbar-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .status-badge .dot {
    width: 5px; height: 5px; border-radius: 50%; display: inline-block;
  }
  .status-badge .dot.green { background: var(--green); }
  .status-badge .dot.yellow { background: #eab308; }
  .status-badge .dot.red { background: var(--red); }
  .status-badge .count { font-weight: 600; }
  .status-badge .count.green { color: var(--green); }
  .status-badge .count.yellow { color: #eab308; }
  .status-badge .count.red { color: var(--red); }
  .status-badge .sep { color: var(--text-dim); margin: 0 1px; }

  .status-badge.clickable { cursor: pointer; transition: border-color 0.15s; }
  .status-badge.clickable:hover { border-color: var(--text-dim); }
  .status-badge .recon-label { font-weight: 600; font-size: 10px; letter-spacing: 0.08em; }
  .status-badge .recon-label.green { color: var(--green); }
  .status-badge .recon-label.red { color: var(--red); }
  .status-badge .recon-label.gray { color: var(--text-dim); }

  #clock {
    font-size: 10px;
    letter-spacing: 0.06em;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--border-2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }
  .refresh-btn.spinning { opacity: 0.4; pointer-events: none; }

  /* ---- RECON DETAIL EXPANDABLE ---- */
  .recon-detail {
    display: none;
    background: var(--red-glow);
    border-bottom: 1px solid var(--red-dim);
    padding: 8px 16px;
    font-size: 12px;
  }
  .recon-detail.visible { display: block; }
  .recon-detail-header {
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .recon-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
  }
  .recon-detail-row:last-child { border-bottom: none; }

  /* ---- MAIN LAYOUT ---- */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 37px);
  }

  .panel {
    background: var(--bg);
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
  }
  .panel-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .panel-label .panel-badge {
    font-size: 9px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* Panel grid assignments */
  .panel-hero { grid-column: 1 / -1; grid-row: 1; }
  .panel-report { grid-column: 1; grid-row: 2; }
  .panel-recs { grid-column: 2; grid-row: 2; }
  .panel-positions { grid-column: 1; grid-row: 3; }
  .panel-bottom-right { grid-column: 2; grid-row: 3; }

  /* ---- HERO: P&L STRIP ---- */
  .hero-strip {
    display: flex;
    align-items: stretch;
    gap: 1px;
    background: var(--border);
    margin: -12px -14px;
  }
  .hero-cell {
    flex: 1;
    background: var(--bg);
    padding: 8px 12px;
    min-width: 0;
  }
  .hero-cell.primary {
    flex: 1.8;
    background: var(--surface);
    border-right: 2px solid var(--amber-dim);
  }
  .hero-val {
    font-size: 19px;
    font-weight: 600;
    color: var(--text-hi);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 2px;
    font-variant-numeric: tabular-nums;
  }
  .hero-val.gain { color: var(--green); }
  .hero-val.loss { color: var(--red); }
  .hero-val.amber { color: var(--amber); }
  .hero-key {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .hero-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .hero-sub .gain { color: var(--green); }
  .hero-sub .loss { color: var(--red); }

  /* Return bar */
  .return-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .return-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
    background: var(--green);
  }
  .return-bar-fill.negative { background: var(--red); }

  /* ---- POSITIONS ---- */
  .position-card {
    border: 1px solid var(--border);
    padding: 8px 10px;
    margin-bottom: 5px;
    position: relative;
    transition: border-color 0.15s;
    background: var(--surface);
  }
  .position-card:hover { border-color: var(--border-2); }
  .position-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--green);
  }
  .position-card.negative::before { background: var(--red); }
  .pos-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .pos-symbol {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-hi);
    letter-spacing: 0.06em;
  }
  .pos-pnl {
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .pos-pnl.gain { color: var(--green); }
  .pos-pnl.loss { color: var(--red); }
  .pos-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .pos-meta-key {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .pos-meta-val {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .pos-reasoning {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.5;
    padding-top: 6px;
    margin-top: 6px;
    border-top: 1px solid var(--border);
    font-weight: 300;
  }
  .pos-reasoning-label {
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: var(--mono);
    font-weight: 400;
    display: block;
    margin-bottom: 2px;
  }

  /* ---- TODAY'S RECS ---- */
  .rec-card {
    border: 1px solid var(--border);
    padding: 8px 10px;
    margin-bottom: 5px;
    background: var(--surface);
  }
  .rec-card.buy { border-left: 2px solid var(--green); }
  .rec-card.sell { border-left: 2px solid var(--red); }
  .rec-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .rec-symbol {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-hi);
    letter-spacing: 0.05em;
  }
  .rec-company {
    font-size: 10px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }
  .rec-badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 1px 5px;
    font-weight: 600;
  }
  .rec-badge.buy { color: var(--green); border: 1px solid var(--green-dim); background: var(--green-glow); }
  .rec-badge.sell { color: var(--red); border: 1px solid var(--red-dim); background: var(--red-glow); }
  .rec-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .rec-detail-label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.08em; }
  .rec-detail-val { color: var(--text-hi); font-variant-numeric: tabular-nums; }
  .rec-reasoning {
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
    font-weight: 300;
    margin-bottom: 4px;
  }
  .rec-risk {
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-style: italic;
  }
  .rec-confidence {
    font-size: 10px;
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .rec-confidence.high { color: var(--green); }
  .rec-confidence.medium { color: var(--amber); }
  .rec-confidence.low { color: var(--red); }

  /* ---- REPORT CARD ---- */
  .rc-header-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 80px;
    gap: 6px;
    padding: 0 0 4px;
    border-bottom: 1px solid var(--border-2);
    margin-bottom: 2px;
  }
  .rc-col-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .rc-col-label.right { text-align: right; }
  .rc-row {
    display: grid;
    grid-template-columns: 1fr 70px 70px 80px;
    gap: 6px;
    align-items: baseline;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .rc-row:last-child { border-bottom: none; }
  .rc-row.portfolio-row {
    background: var(--amber-glow);
    border-bottom: 2px solid var(--amber-dim);
    margin: 0 -6px;
    padding: 5px 6px;
    font-weight: 600;
  }
  .rc-name {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .rc-name.portfolio-name {
    color: var(--amber);
    font-weight: 700;
    font-size: 12px;
  }
  .rc-ret {
    font-size: 11px;
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .rc-ann {
    font-size: 11px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
  }
  .rc-delta {
    font-size: 11px;
    text-align: right;
    letter-spacing: 0.04em;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .rc-delta.beating { color: var(--green); }
  .rc-delta.lagging { color: var(--red); }
  .rc-meta {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .rc-meta-val { color: var(--amber); font-weight: 500; }
  .rc-verdict {
    margin-top: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    border-radius: 3px;
    text-align: center;
  }
  .rc-verdict.winning {
    background: var(--green-glow);
    border: 1px solid var(--green-dim);
    color: var(--green);
  }
  .rc-verdict.losing {
    background: var(--red-glow);
    border: 1px solid var(--red-dim);
    color: var(--red);
  }
  .rc-verdict.tied {
    background: var(--amber-glow);
    border: 1px solid var(--amber-dim);
    color: var(--amber);
  }
  .rc-metrics {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border-2);
  }
  .rc-metrics-header {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .rc-metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .rc-metric-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 8px;
  }
  .rc-metric-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .rc-metric-val {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-hi);
    font-variant-numeric: tabular-nums;
  }
  .rc-metric-val.gain { color: var(--green); }
  .rc-metric-val.loss { color: var(--red); }

  /* ---- RECENT TRADES ---- */
  .trades-table {
    width: 100%;
    border-collapse: collapse;
  }
  .trades-table th {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    padding: 0 0 4px;
    border-bottom: 1px solid var(--border-2);
    font-weight: 400;
  }
  .trades-table th.r { text-align: right; }
  .trades-table td {
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .trades-table td.r { text-align: right; }
  .trades-table tr:last-child td { border-bottom: none; }
  .trade-sym {
    font-weight: 600;
    color: var(--text-hi);
    letter-spacing: 0.04em;
  }
  .trade-action {
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 1px 4px;
    font-weight: 600;
  }
  .trade-action.sell { color: var(--red); }
  .trade-action.buy { color: var(--green); }
  .trade-date { color: var(--text-dim); font-size: 11px; }

  /* ---- TOKEN COSTS ---- */
  .cost-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  .cost-row:last-child { border-bottom: none; }
  .cost-key { color: var(--text-dim); font-size: 11px; letter-spacing: 0.06em; }
  .cost-val { font-size: 12px; color: var(--text-hi); font-weight: 500; }
  .cost-bar-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin: 4px 0 2px;
  }
  .cost-bar-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .cost-bar-fill.over { background: var(--red); }
  .cost-hint {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .cost-breakdown {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 3px;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ---- SHARED ---- */
  .gain { color: var(--green); }
  .loss { color: var(--red); }
  .empty-state {
    color: var(--text-dim);
    font-size: 12px;
    padding: 20px 0;
    text-align: center;
    border: 1px dashed var(--border);
  }
  .skeleton {
    background: linear-gradient(90deg,var(--border) 25%,var(--border-2) 50%,var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
    display: inline-block;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .sk-line { height: 12px; margin-bottom: 6px; }
  .sk-big { height: 24px; margin-bottom: 8px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
  .loaded { animation: fadeIn 0.2s ease forwards; }

  /* ---- SECTION DIVIDER ---- */
  .sub-divider {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 0 4px;
    margin-top: 6px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sub-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    body { zoom: 1; }
    .dashboard {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .panel-hero,
    .panel-report,
    .panel-recs,
    .panel-positions,
    .panel-bottom-right { grid-column: 1; grid-row: auto; }
    .hero-strip { flex-direction: column; }
    .hero-cell.primary { border-right: none; border-bottom: 2px solid var(--amber-dim); }
    .topbar {
      flex-wrap: wrap;
      height: auto;
      padding: 6px 12px;
      gap: 4px;
    }
    .topbar-brand { width: auto; margin-right: auto; }
    .topbar-nav { width: 100%; order: 3; flex-wrap: wrap; gap: 0; }
    .topbar-status { order: 2; flex-wrap: wrap; gap: 6px; }
    .nav-link { padding: 4px 8px; }
    .pos-meta { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .hero-strip { flex-direction: column; }
    .hero-val { font-size: 18px; }
    .pos-meta { grid-template-columns: 1fr 1fr; }
    .rc-header-row,
    .rc-row { grid-template-columns: 1fr 60px 70px; }
    .rc-ann-col { display: none; }
    .panel { padding: 10px; }
    .logo { font-size: 11px; }
    .topbar-right #clock { display: none; }
    .trades-table .hide-mobile { display: none; }
  }
</style>
</head>
<body>

  </div>

  <nav class="topbar-nav">

<div class="dashboard">

  <!-- ROW 1: HERO P&L STRIP (full width) -->

        <div class="hero-cell primary">
          <div class="skeleton sk-big" style="width:60%"></div>
          <div class="skeleton sk-line" style="width:40%"></div>
        </div>
        <div class="hero-cell"><div class="skeleton sk-big" style="width:70%"></div></div>
        <div class="hero-cell"><div class="skeleton sk-big" style="width:70%"></div></div>
        <div class="hero-cell"><div class="skeleton sk-big" style="width:70%"></div></div>
        <div class="hero-cell"><div class="skeleton sk-big" style="width:70%"></div></div>
      </div>
    </div>

  <!-- ROW 2 LEFT: REPORT CARD -->
  <div class="panel panel-report">

    <div id="benchmarks-content">

  <!-- ROW 2 RIGHT: TODAY'S PICKS -->

  <!-- ROW 3 LEFT: OPEN POSITIONS -->

      <div class="skeleton sk-line" style="width:60%"></div>
    </div>
  </div>

</div>

<script>
(function() {
  'use strict';

  var API = '/api/v1';

  // ---- Company name lookup for tooltips ----
  var NAMES = {
    AAPL:'Apple',MSFT:'Microsoft',NVDA:'NVIDIA',AMZN:'Amazon',GOOGL:'Alphabet',
    META:'Meta Platforms',TSLA:'Tesla',AVGO:'Broadcom',ORCL:'Oracle',CRM:'Salesforce',
    AMD:'AMD',NFLX:'Netflix',ADBE:'Adobe',NOW:'ServiceNow',PANW:'Palo Alto Networks',
    CRWD:'CrowdStrike',DDOG:'Datadog',PLTR:'Palantir',JPM:'JPMorgan Chase',V:'Visa',
    MA:'Mastercard',GS:'Goldman Sachs',BLK:'BlackRock',SPGI:'S&P Global',SCHW:'Charles Schwab',
    ICE:'Intercontinental Exchange',UNH:'UnitedHealth',JNJ:'Johnson & Johnson',ABBV:'AbbVie',
    LLY:'Eli Lilly',MRK:'Merck',PFE:'Pfizer',WMT:'Walmart',HD:'Home Depot',COST:'Costco',
    PG:'Procter & Gamble',KO:'Coca-Cola',PEP:'PepsiCo',XOM:'Exxon Mobil',CVX:'Chevron',
    COP:'ConocoPhillips',SLB:'Schlumberger',HAL:'Halliburton',OXY:'Occidental Petroleum',
    BA:'Boeing',CAT:'Caterpillar',HON:'Honeywell',GE:'GE Aerospace',RTX:'RTX Corp',
    DE:'Deere & Co',UBER:'Uber',DIS:'Disney',HOOD:'Robinhood',PYPL:'PayPal',
    COIN:'Coinbase',NET:'Cloudflare',SNOW:'Snowflake',SHOP:'Shopify',
    INTC:'Intel',QCOM:'Qualcomm',MU:'Micron',NXPI:'NXP Semi',TXN:'Texas Instruments',
    ANET:'Arista Networks',TMO:'Thermo Fisher',ABT:'Abbott Labs',DHR:'Danaher',
    BMY:'Bristol-Myers Squibb',AMGN:'Amgen',GILD:'Gilead Sciences',ISRG:'Intuitive Surgical',
    VRTX:'Vertex Pharma',REGN:'Regeneron',MDT:'Medtronic',SYK:'Stryker',BSX:'Boston Scientific',
    T:'AT&T',VZ:'Verizon',TMUS:'T-Mobile',LMT:'Lockheed Martin',NOC:'Northrop Grumman',
    GD:'General Dynamics',UNP:'Union Pacific',UPS:'UPS',FDX:'FedEx',WM:'Waste Management',
    LOW:'Lowe\'s',TGT:'Target',NKE:'Nike',SBUX:'Starbucks',MCD:'McDonald\'s',
    MS:'Morgan Stanley',WFC:'Wells Fargo',BAC:'Bank of America',C:'Citigroup',
    AXP:'American Express',CME:'CME Group',EOG:'EOG Resources',MPC:'Marathon Petroleum',
    PSX:'Phillips 66',VLO:'Valero Energy',DVN:'Devon Energy',FANG:'Diamondback Energy',
    NEE:'NextEra Energy',SO:'Southern Co',DUK:'Duke Energy',
    SPY:'S&P 500 ETF',QQQ:'Nasdaq 100 ETF',RSP:'S&P Equal Wt ETF',
    MTUM:'Momentum Factor ETF',SPMO:'S&P Momentum ETF',
  };
  function companyName(sym) { return NAMES[sym] || ''; }

  // Fetch dynamic company names from Phase 0 cache and merge
  apiFetch('/research/company-names').then(function(data) {
    if (data && typeof data === 'object') {
      Object.keys(data).forEach(function(sym) {
        if (!NAMES[sym] && data[sym]) NAMES[sym] = data[sym];
      });
    }
  }).catch(function() {});

  // ---- Safety: escape all API content before DOM insertion ----
  function esc(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ---- Formatters ----
  function fmt$(n) {
    var v = parseFloat(n);
    if (isNaN(v)) return '\u2014';
    return '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function fmtGain$(n) {
    var v = parseFloat(n);
    if (isNaN(v)) return '\u2014';
    var sign = v < 0 ? '-' : '+';
    return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  function fmtPct(n) {
    var v = parseFloat(n);
    if (isNaN(v)) return '\u2014';
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  }
  function gainCls(n) { return parseFloat(n) >= 0 ? 'gain' : 'loss'; }
  function fmtDate(d) {
    if (!d) return '\u2014';
    return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
  }
  function fmtDateFull(d) {
    if (!d) return '\u2014';
    return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }

  function apiFetch(path) {
    return fetch(API + path).then(function(r) {
      if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
      return r.json();
    });
  }

  // Helper: create a span with label + styled value
  function metaSpan(label, value, valueCls) {
    var span = document.createElement('span');
    var labelNode = document.createTextNode(label + ': ');
    span.appendChild(labelNode);
    var valEl = document.createElement('span');
    valEl.className = 'rc-meta-val' + (valueCls ? ' ' + valueCls : '');
    valEl.textContent = value;
    span.appendChild(valEl);
    return span;
  }

  // ---- Clock ----
  function updateClock() {
    var el = document.getElementById('clock');
    if (el) el.textContent = new Date().toLocaleTimeString('en-US', {hour12:false}) + ' ET';
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ---- Hero P&L Strip ----
  function renderHero(p) {
    var el = document.getElementById('hero-content');
    el.className = 'loaded';

    var ret = parseFloat(p.all_time_return_pct);
    var totalVal = parseFloat(p.total_value);
    var startCap = parseFloat(p.starting_capital);
    var unrealized = parseFloat(p.total_unrealized_gain);
    var cash = parseFloat(p.cash_balance);
    var posVal = parseFloat(p.total_positions_value);
    var realized = totalVal - startCap - unrealized;
    var totalGain = totalVal - startCap;
    var barPct = Math.min(Math.abs(ret) * 4, 100);

    var strip = document.createElement('div');
    strip.className = 'hero-strip';

    // Primary cell: total value + return
    var c1 = document.createElement('div');
    c1.className = 'hero-cell primary';
    var v1 = document.createElement('div');
    v1.className = 'hero-val';
    v1.textContent = fmt$(totalVal);
    var k1 = document.createElement('div');
    k1.className = 'hero-key';
    k1.textContent = 'PORTFOLIO VALUE';
    var s1 = document.createElement('div');
    s1.className = 'hero-sub';
    var retSpan = document.createElement('span');
    retSpan.className = gainCls(ret);
    retSpan.textContent = fmtPct(ret);
    s1.appendChild(retSpan);
    s1.appendChild(document.createTextNode(' all-time'));
    var bar = document.createElement('div');
    bar.className = 'return-bar';
    var fill = document.createElement('div');
    fill.className = 'return-bar-fill' + (ret < 0 ? ' negative' : '');
    fill.style.width = barPct + '%';
    bar.appendChild(fill);
    c1.appendChild(v1);
    c1.appendChild(k1);
    c1.appendChild(s1);
    c1.appendChild(bar);
    strip.appendChild(c1);

    // Total P&L
    var c2 = document.createElement('div');
    c2.className = 'hero-cell';
    var v2 = document.createElement('div');
    v2.className = 'hero-val ' + gainCls(totalGain);
    v2.textContent = fmtGain$(totalGain);
    var k2 = document.createElement('div');
    k2.className = 'hero-key';
    k2.textContent = 'TOTAL P&L';
    c2.appendChild(v2);
    c2.appendChild(k2);
    strip.appendChild(c2);

    // Unrealized P&L
    var c3 = document.createElement('div');
    c3.className = 'hero-cell';
    var v3 = document.createElement('div');
    v3.className = 'hero-val ' + gainCls(unrealized);
    v3.textContent = fmtGain$(unrealized);
    var k3 = document.createElement('div');
    k3.className = 'hero-key';
    k3.textContent = 'UNREALIZED';
    var s3 = document.createElement('div');
    s3.className = 'hero-sub';
    s3.textContent = p.positions.length + ' position' + (p.positions.length !== 1 ? 's' : '');
    c3.appendChild(v3);
    c3.appendChild(k3);
    c3.appendChild(s3);
    strip.appendChild(c3);

    // Realized P&L
    var c4 = document.createElement('div');
    c4.className = 'hero-cell';
    var v4 = document.createElement('div');
    v4.className = 'hero-val ' + gainCls(realized);
    v4.textContent = fmtGain$(realized);
    var k4 = document.createElement('div');
    k4.className = 'hero-key';
    k4.textContent = 'REALIZED';
    c4.appendChild(v4);
    c4.appendChild(k4);
    strip.appendChild(c4);

    // Allocation bar (Cash vs Invested)
    var c5 = document.createElement('div');
    c5.className = 'hero-cell';
    c5.style.minWidth = '140px';
    var k5 = document.createElement('div');
    k5.className = 'hero-key';
    k5.textContent = 'ALLOCATION';
    c5.appendChild(k5);

    var cashPct = totalVal > 0 ? ((cash / totalVal) * 100) : 0;
    var investedPct = totalVal > 0 ? ((posVal / totalVal) * 100) : 0;

    var barOuter = document.createElement('div');
    barOuter.style.cssText = 'height:14px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0 4px;display:flex';
    var barInv = document.createElement('div');
    barInv.style.cssText = 'height:100%;background:var(--amber);transition:width 0.6s';
    barInv.style.width = investedPct.toFixed(0) + '%';
    barOuter.appendChild(barInv);
    c5.appendChild(barOuter);

    var legend = document.createElement('div');
    legend.style.cssText = 'display:flex;justify-content:space-between;font-size:10px;font-variant-numeric:tabular-nums';
    var legInv = document.createElement('span');
    legInv.style.color = 'var(--amber)';
    legInv.textContent = fmt$(posVal) + ' invested (' + investedPct.toFixed(0) + '%)';
    var legCash = document.createElement('span');
    legCash.style.color = 'var(--text-dim)';
    legCash.textContent = fmt$(cash) + ' cash (' + cashPct.toFixed(0) + '%)';
    legend.appendChild(legInv);
    legend.appendChild(legCash);
    c5.appendChild(legend);

    strip.appendChild(c5);

    el.textContent = '';
    el.appendChild(strip);
  }

  // ---- Report Card ----
  function renderBenchmarks(data) {
    var el = document.getElementById('benchmarks-content');
    el.className = 'loaded';
    el.textContent = '';

    var sinceDate = new Date(data.since_date + 'T00:00:00');
    var daysSinceStart = Math.floor((Date.now() - sinceDate.getTime()) / 86400000);
    var portRet = parseFloat(data.portfolio_return_pct);

    // Annualized return
    var annualized = daysSinceStart > 0 ? (Math.pow(1 + portRet / 100, 365 / daysSinceStart) - 1) * 100 : 0;

    // Meta info (built with safe DOM methods)
    var meta = document.createElement('div');
    meta.className = 'rc-meta';
    meta.appendChild(metaSpan('Started', fmtDateFull(data.since_date)));
    meta.appendChild(metaSpan('Running', daysSinceStart + ' days'));
    meta.appendChild(metaSpan('Annualized', fmtPct(annualized)));
    el.appendChild(meta);

    // Column headers
    var colH = document.createElement('div');
    colH.className = 'rc-header-row';
    var labels = ['', 'Return', 'Ann.', 'vs Bot'];
    labels.forEach(function(l, i) {
      var sp = document.createElement('span');
      sp.className = 'rc-col-label' + (i > 0 ? ' right' : '') + (i === 2 ? ' rc-ann-col' : '');
      sp.textContent = l;
      colH.appendChild(sp);
    });
    el.appendChild(colH);

    // Portfolio row
    var portRow = document.createElement('div');
    portRow.className = 'rc-row portfolio-row';
    var portName = document.createElement('span');
    portName.className = 'rc-name portfolio-name';
    portName.textContent = 'TRADEBOT';
    var portRetEl = document.createElement('span');
    portRetEl.className = 'rc-ret ' + gainCls(portRet);
    portRetEl.textContent = fmtPct(portRet);
    var portAnn = document.createElement('span');
    portAnn.className = 'rc-ann ' + gainCls(annualized) + ' rc-ann-col';
    portAnn.textContent = fmtPct(annualized);
    var portSpacer = document.createElement('span');
    portSpacer.className = 'rc-delta';
    portSpacer.textContent = '\u2014';
    portSpacer.style.color = 'var(--text-dim)';
    portRow.appendChild(portName);
    portRow.appendChild(portRetEl);
    portRow.appendChild(portAnn);
    portRow.appendChild(portSpacer);
    el.appendChild(portRow);

    // Benchmark rows
    var beatCount = 0;
    data.benchmarks.forEach(function(b) {
      var bRet = parseFloat(b.return_pct);
      var diff = portRet - bRet;
      var bAnn = daysSinceStart > 0 ? (Math.pow(1 + bRet / 100, 365 / daysSinceStart) - 1) * 100 : 0;
      if (diff >= 0) beatCount++;

      var row = document.createElement('div');
      row.className = 'rc-row';

      var name = document.createElement('span');
      name.className = 'rc-name';
      name.textContent = b.name;

      var ret = document.createElement('span');
      ret.className = 'rc-ret ' + gainCls(bRet);
      ret.textContent = fmtPct(bRet);

      var ann = document.createElement('span');
      ann.className = 'rc-ann ' + gainCls(bAnn) + ' rc-ann-col';
      ann.textContent = fmtPct(bAnn);

      var delta = document.createElement('span');
      var botWinning = diff >= 0;
      delta.className = 'rc-delta ' + (botWinning ? 'beating' : 'lagging');
      var sign = diff >= 0 ? '+' : '';
      delta.textContent = (botWinning ? '\u25B2 ' : '\u25BC ') + sign + diff.toFixed(2) + '%';

      row.appendChild(name);
      row.appendChild(ret);
      row.appendChild(ann);
      row.appendChild(delta);
      el.appendChild(row);
    });

    // Verdict banner
    var total = data.benchmarks.length;
    var verdict = document.createElement('div');
    if (beatCount === total) {
      verdict.className = 'rc-verdict winning';
      verdict.textContent = 'BEATING ALL ' + total + ' BENCHMARKS';
    } else if (beatCount === 0) {
      verdict.className = 'rc-verdict losing';
      verdict.textContent = 'LAGGING ALL ' + total + ' BENCHMARKS';
    } else {
      verdict.className = 'rc-verdict ' + (beatCount > total / 2 ? 'winning' : 'losing');
      verdict.textContent = 'BEATING ' + beatCount + ' OF ' + total + ' BENCHMARKS';
    }
    el.appendChild(verdict);

    // ---- Trade Performance Metrics ----
    var tm = data.trade_metrics;
    if (tm && tm.total_closed > 0) {
      var metricsDiv = document.createElement('div');
      metricsDiv.className = 'rc-metrics';

      var mHeader = document.createElement('div');
      mHeader.className = 'rc-metrics-header';
      mHeader.textContent = 'Trade Performance';
      metricsDiv.appendChild(mHeader);

      var mGrid = document.createElement('div');
      mGrid.className = 'rc-metrics-grid';

      var metrics = [
        ['Record', tm.win_count + 'W / ' + tm.loss_count + 'L', ''],
        ['Win Rate', tm.win_rate + '%', tm.win_rate >= 50 ? 'gain' : 'loss'],
        ['Profit Factor', tm.profit_factor != null ? tm.profit_factor.toFixed(2) : '\u2014', tm.profit_factor != null ? (tm.profit_factor >= 1 ? 'gain' : 'loss') : ''],
        ['Avg Win', fmtGain$(tm.avg_win), 'gain'],
        ['Avg Loss', fmtGain$(tm.avg_loss), 'loss'],
        ['Expectancy', fmtGain$(tm.expectancy), tm.expectancy >= 0 ? 'gain' : 'loss'],
        ['Max Drawdown', '-' + fmt$(tm.max_drawdown), 'loss'],
        ['Avg Hold', tm.avg_holding_days != null ? tm.avg_holding_days + 'd' : '\u2014', ''],
        ['Max Consec. L', tm.max_consecutive_losses + '', tm.max_consecutive_losses >= 4 ? 'loss' : ''],
      ];

      metrics.forEach(function(m) {
        var cell = document.createElement('div');
        cell.className = 'rc-metric-cell';
        var label = document.createElement('div');
        label.className = 'rc-metric-label';
        label.textContent = m[0];
        var val = document.createElement('div');
        val.className = 'rc-metric-val' + (m[2] ? ' ' + m[2] : '');
        val.textContent = m[1];
        cell.appendChild(label);
        cell.appendChild(val);
        mGrid.appendChild(cell);
      });

      metricsDiv.appendChild(mGrid);
      el.appendChild(metricsDiv);
    }
  }

  // ---- Open Positions ----
  function renderPositions(positions) {
    var el = document.getElementById('positions-content');
    el.className = 'loaded';

    document.getElementById('pos-count').textContent = positions.length;

    if (!positions.length) {
      el.textContent = '';
      var e = document.createElement('div');
      e.className = 'empty-state';
      e.textContent = 'NO OPEN POSITIONS';
      el.appendChild(e);
      return Promise.resolve();
    }

    // Fetch reasoning from recent sessions
    var reasoningMap = {};
    return apiFetch('/recommendations?limit=5').then(function(sessions) {
      var chain = Promise.resolve();
      sessions.forEach(function(s) {
        chain = chain.then(function() {
          return apiFetch('/recommendations/' + s.id).then(function(detail) {
            detail.recommendations.forEach(function(r) {
              if (r.action === 'buy' && !reasoningMap[r.symbol]) {
                reasoningMap[r.symbol] = r.reasoning;
              }
            });
          });
        });
      });
      return chain;
    }).catch(function() {}).then(function() {
      el.textContent = '';

      // Sort: biggest gain first
      var sorted = positions.slice().sort(function(a, b) {
        return parseFloat(b.unrealized_gain) - parseFloat(a.unrealized_gain);
      });

      sorted.forEach(function(pos) {
        var gain = parseFloat(pos.unrealized_gain);
        var card = document.createElement('div');
        card.className = 'position-card' + (gain < 0 ? ' negative' : '');

        // Header: symbol + P&L
        var hdr = document.createElement('div');
        hdr.className = 'pos-header';
        var sym = document.createElement('span');
        sym.className = 'pos-symbol';
        sym.textContent = pos.symbol;
        var pcn = companyName(pos.symbol);
        if (pcn) {
          sym.title = pcn;
          var pcnSpan = document.createElement('span');
          pcnSpan.style.cssText = 'font-size:11px;font-weight:300;color:var(--text-dim);margin-left:6px;letter-spacing:0.02em';
          pcnSpan.textContent = pcn;
          sym.appendChild(pcnSpan);
        }
        var pnl = document.createElement('span');
        pnl.className = 'pos-pnl ' + gainCls(gain);
        pnl.textContent = fmtGain$(gain) + ' (' + fmtPct(pos.unrealized_gain_pct) + ')';
        hdr.appendChild(sym);
        hdr.appendChild(pnl);
        card.appendChild(hdr);

        // Meta grid
        var meta = document.createElement('div');
        meta.className = 'pos-meta';
        var items = [
          ['SHARES', parseFloat(pos.shares).toFixed(2)],
          ['AVG COST', fmt$(pos.avg_cost_basis)],
          ['PRICE', fmt$(pos.current_price)],
          ['HELD', pos.days_held + 'd'],
        ];
        items.forEach(function(pair) {
          var item = document.createElement('div');
          var key = document.createElement('div');
          key.className = 'pos-meta-key';
          key.textContent = pair[0];
          var val = document.createElement('div');
          val.className = 'pos-meta-val';
          val.textContent = pair[1];
          item.appendChild(key);
          item.appendChild(val);
          meta.appendChild(item);
        });
        card.appendChild(meta);

        // Reasoning
        var reasoning = reasoningMap[pos.symbol];
        if (reasoning) {
          var box = document.createElement('div');
          box.className = 'pos-reasoning';
          var lbl = document.createElement('span');
          lbl.className = 'pos-reasoning-label';
          lbl.textContent = 'Buy Thesis';
          box.appendChild(lbl);
          box.appendChild(document.createTextNode(reasoning));
          card.appendChild(box);
        }

        el.appendChild(card);
      });
    });
  }

  // ---- Recent Trades ----
  function renderTrades(history) {
    var el = document.getElementById('closed-content');
    el.className = 'loaded';
    el.textContent = '';

    if (!history.length) {
      var e = document.createElement('div');
      e.className = 'empty-state';
      e.textContent = 'NO TRADES IN LAST 30 DAYS';
      el.appendChild(e);
      return;
    }

    var table = document.createElement('table');
    table.className = 'trades-table';

    var thead = document.createElement('thead');
    var hRow = document.createElement('tr');
    var cols = [
      {text: 'SYM', cls: ''},
      {text: 'ACT', cls: ''},
      {text: 'DATE', cls: ''},
      {text: 'SH', cls: 'r hide-mobile'},
      {text: 'PRICE', cls: 'r'},
      {text: 'P&L', cls: 'r'},
    ];
    cols.forEach(function(c) {
      var th = document.createElement('th');
      th.textContent = c.text;
      th.className = c.cls;
      hRow.appendChild(th);
    });
    thead.appendChild(hRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    history.forEach(function(h) {
      var g = parseFloat(h.realized_gain) || 0;
      var tr = document.createElement('tr');

      var tdSym = document.createElement('td');
      tdSym.className = 'trade-sym';
      tdSym.textContent = h.symbol;

      var tdAct = document.createElement('td');
      var actSpan = document.createElement('span');
      actSpan.className = 'trade-action ' + h.action;
      actSpan.textContent = h.action.toUpperCase();
      tdAct.appendChild(actSpan);

      var tdDate = document.createElement('td');
      tdDate.className = 'trade-date';
      tdDate.textContent = fmtDate(h.executed_at);

      var tdSh = document.createElement('td');
      tdSh.className = 'r hide-mobile';
      tdSh.style.color = 'var(--text-dim)';
      tdSh.style.fontSize = '11px';
      tdSh.textContent = parseFloat(h.shares).toFixed(0);

      var tdPx = document.createElement('td');
      tdPx.className = 'r';
      tdPx.style.fontSize = '11px';
      tdPx.textContent = '$' + parseFloat(h.execution_price).toFixed(2);

      var tdPnl = document.createElement('td');
      tdPnl.className = 'r';
      if (h.action === 'sell') {
        tdPnl.className += ' ' + gainCls(g);
        tdPnl.style.fontWeight = '600';
        tdPnl.textContent = fmtGain$(g);
      } else {
        tdPnl.style.color = 'var(--text-dim)';
        tdPnl.textContent = '\u2014';
      }

      [tdSym, tdAct, tdDate, tdSh, tdPx, tdPnl].forEach(function(td) { tr.appendChild(td); });
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    el.appendChild(table);
  }

  // ---- Reconciliation ----
  window.toggleReconDetail = function() {
    document.getElementById('recon-detail').classList.toggle('visible');
  };

  function renderRecon(brokerStatus) {
    var dot = document.getElementById('recon-dot');
    var label = document.getElementById('recon-label');
    var panel = document.getElementById('recon-detail');

    if (!brokerStatus || brokerStatus.broker_mode === 'paper') {
      dot.className = 'dot green';
      label.className = 'recon-label green';
      label.textContent = 'N/A';
      panel.textContent = '';
      panel.classList.remove('visible');
      return;
    }

    var recon = brokerStatus.reconciliation;
    if (!recon) {
      dot.className = 'dot gray';
      label.className = 'recon-label gray';
      label.textContent = '---';
      return;
    }

    if (recon.has_mismatches) {
      var n = recon.mismatches.length;
      dot.className = 'dot red';
      label.className = 'recon-label red';
      label.textContent = n + ' MISMATCH' + (n > 1 ? 'ES' : '');

      panel.textContent = '';
      var hdr = document.createElement('div');
      hdr.className = 'recon-detail-header';
      hdr.textContent = 'POSITION MISMATCHES \u2014 LOCAL DB vs BROKER';
      panel.appendChild(hdr);

      recon.mismatches.forEach(function(m) {
        var row = document.createElement('div');
        row.className = 'recon-detail-row';
        var symSpan = document.createElement('span');
        symSpan.style.cssText = 'font-weight:600;color:var(--text-hi)';
        symSpan.textContent = m.symbol;
        var qtySpan = document.createElement('span');
        qtySpan.textContent = 'Local: ' + m.local_qty + ' / Broker: ' + m.broker_qty;
        row.appendChild(symSpan);
        row.appendChild(qtySpan);
        panel.appendChild(row);
      });
    } else {
      dot.className = 'dot green';
      label.className = 'recon-label green';
      label.textContent = 'OK';
      panel.textContent = '';
      panel.classList.remove('visible');
    }
  }

  // ---- Today's Recs ----
  function renderRecs() {
    var el = document.getElementById('recs-content');
    var today = new Date().toISOString().slice(0,10);
    return apiFetch('/recommendations?session_date=' + today + '&limit=1').then(function(sessions) {
      el.className = 'loaded';
      el.textContent = '';

      if (!sessions.length) {
        var e = document.createElement('div');
        e.className = 'empty-state';
        e.textContent = 'NO PICKS TODAY';
        el.appendChild(e);
        return;
      }

      return apiFetch('/recommendations/' + sessions[0].id).then(function(detail) {
        if (!detail.recommendations.length) {
          var e = document.createElement('div');
          e.className = 'empty-state';
          e.textContent = 'NO TRADES TODAY';
          el.appendChild(e);
          if (detail.research_summary) {
            var box = document.createElement('div');
            box.style.cssText = 'font-family:var(--sans);font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:8px;font-weight:300';
            var lbl = document.createElement('div');
            lbl.style.cssText = 'font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px';
            lbl.textContent = 'SUMMARY';
            box.appendChild(lbl);
            box.appendChild(document.createTextNode(detail.research_summary));
            el.appendChild(box);
          }
          return;
        }

        detail.recommendations.forEach(function(r) {
          var card = document.createElement('div');
          card.className = 'rec-card ' + r.action;

          var hdr = document.createElement('div');
          hdr.className = 'rec-header';
          var sym = document.createElement('span');
          sym.className = 'rec-symbol';
          sym.textContent = r.symbol;
          var cn = companyName(r.symbol);
          if (cn) {
            sym.title = cn;
            var cnSpan = document.createElement('span');
            cnSpan.className = 'rec-company';
            cnSpan.textContent = cn;
            sym.appendChild(document.createTextNode(' '));
            sym.appendChild(cnSpan);
          }
          var badge = document.createElement('span');
          badge.className = 'rec-badge ' + r.action;
          badge.textContent = r.action.toUpperCase();
          hdr.appendChild(sym);
          hdr.appendChild(badge);
          card.appendChild(hdr);

          // Price + qty row
          var d1 = document.createElement('div');
          d1.className = 'rec-detail-row';
          var d1l = document.createElement('span');
          d1l.className = 'rec-detail-label';
          d1l.textContent = 'TARGET';
          var d1v = document.createElement('span');
          d1v.className = 'rec-detail-val';
          d1v.textContent = fmt$(r.suggested_price);
          d1.appendChild(d1l);
          d1.appendChild(d1v);
          card.appendChild(d1);

          var d2 = document.createElement('div');
          d2.className = 'rec-detail-row';
          var d2l = document.createElement('span');
          d2l.className = 'rec-detail-label';
          d2l.textContent = 'QTY / COST';
          var d2v = document.createElement('span');
          d2v.className = 'rec-detail-val';
          d2v.textContent = parseFloat(r.quantity).toFixed(0) + ' sh \u00b7 ' + fmt$(r.estimated_cost);
          d2.appendChild(d2l);
          d2.appendChild(d2v);
          card.appendChild(d2);

          var reasoning = document.createElement('div');
          reasoning.className = 'rec-reasoning';
          reasoning.textContent = r.reasoning;
          card.appendChild(reasoning);

          if (r.key_risks) {
            var risk = document.createElement('div');
            risk.className = 'rec-risk';
            risk.textContent = r.key_risks;
            card.appendChild(risk);
          }

          var footer = document.createElement('div');
          footer.style.cssText = 'margin-top:4px;display:flex;justify-content:space-between;align-items:center';
          var conf = document.createElement('span');
          conf.className = 'rec-confidence ' + (r.confidence || 'medium');
          conf.textContent = (r.confidence || 'medium').toUpperCase() + ' CONF';
          footer.appendChild(conf);
          card.appendChild(footer);

          el.appendChild(card);
        });
      });
    }).catch(function(e) {
      el.className = 'loaded';
      el.textContent = '';
      var err = document.createElement('div');
      err.className = 'empty-state';
      err.style.color = 'var(--red)';
      err.textContent = 'FETCH ERROR: ' + e.message;
      el.appendChild(err);
    });
  }

  // ---- Token Costs ----
  function renderCosts(costs) {
    var el = document.getElementById('costs-content');
    el.className = 'loaded';
    el.textContent = '';

    var DAILY_TARGET = 1.00;
    var todayCost = costs.today.total_cost_usd || 0;
    var pct = Math.min((todayCost / DAILY_TARGET) * 100, 100);

    // Today with bar
    var todayRow = document.createElement('div');
    todayRow.className = 'cost-row';
    var tk = document.createElement('span');
    tk.className = 'cost-key';
    tk.textContent = 'Today';
    var tv = document.createElement('span');
    tv.className = 'cost-val' + (todayCost > DAILY_TARGET ? ' loss' : '');
    tv.textContent = '$' + todayCost.toFixed(4);
    todayRow.appendChild(tk);
    todayRow.appendChild(tv);
    el.appendChild(todayRow);

    var track = document.createElement('div');
    track.className = 'cost-bar-track';
    var fill = document.createElement('div');
    fill.className = 'cost-bar-fill' + (pct > 80 ? ' over' : '');
    fill.style.width = pct + '%';
    track.appendChild(fill);
    el.appendChild(track);

    var hint = document.createElement('div');
    hint.className = 'cost-hint';
    hint.textContent = pct.toFixed(0) + '% of $1.00/day target';
    el.appendChild(hint);

    // Today breakdown
    if (costs.today.by_call_type && Object.keys(costs.today.by_call_type).length) {
      var breakdown = document.createElement('div');
      breakdown.className = 'cost-breakdown';
      Object.keys(costs.today.by_call_type).forEach(function(type) {
        var d = costs.today.by_call_type[type];
        var chip = document.createElement('span');
        chip.textContent = type + ': $' + (d.cost_usd || 0).toFixed(4);
        breakdown.appendChild(chip);
      });
      el.appendChild(breakdown);
    }

    // Other periods
    var periods = [
      ['7-day', costs.last_7_days],
      ['30-day', costs.last_30_days],
      ['All-time', costs.all_time],
    ];
    periods.forEach(function(pair) {
      var row = document.createElement('div');
      row.className = 'cost-row';
      var k = document.createElement('span');
      k.className = 'cost-key';
      k.textContent = pair[0];
      var v = document.createElement('span');
      v.className = 'cost-val';
      v.textContent = '$' + (pair[1].total_cost_usd || 0).toFixed(4);
      row.appendChild(k);
      row.appendChild(v);
      el.appendChild(row);
    });
  }

  // ---- Main Load ----
  function loadAll() {
    var btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    btn.textContent = 'LOADING';

    // Health check
    fetch('/health').then(function(r) { return r.json(); }).then(function(data) {
      var dot = document.getElementById('status-dot');
      var txt = document.getElementById('status-text');
      if (data.db === 'connected') {
        dot.classList.remove('offline');
        txt.textContent = 'LIVE';
      } else {
        dot.classList.add('offline');
        txt.textContent = 'DB ERROR';
      }
    }).catch(function() {
      document.getElementById('status-dot').classList.add('offline');
      document.getElementById('status-text').textContent = 'OFFLINE';
    });

    // API health
    apiFetch('/system/health').then(function(sh) {
      document.getElementById('api-green').textContent = sh.summary ? sh.summary.green : 0;
      document.getElementById('api-yellow').textContent = sh.summary ? sh.summary.yellow : 0;
      document.getElementById('api-red').textContent = sh.summary ? sh.summary.red : 0;
      var bmode = sh.broker ? sh.broker.mode : 'paper';
      var modeLabel = {paper:'SIMULATED',alpaca_paper:'ALPACA PAPER',alpaca_live:'LIVE TRADING'}[bmode] || bmode.toUpperCase();
      document.getElementById('broker-label').textContent = modeLabel;
    }).catch(function() {
      document.getElementById('api-green').textContent = '?';
    });

    // Main data
    Promise.allSettled([
      apiFetch('/portfolio'),
      apiFetch('/portfolio/history?limit=20'),
      apiFetch('/costs'),
      apiFetch('/portfolio/benchmarks'),
      apiFetch('/broker/status'),
    ]).then(function(results) {
      var portfolioR = results[0];
      var historyR = results[1];
      var costsR = results[2];
      var benchmarksR = results[3];
      var brokerR = results[4];

      if (portfolioR.status === 'fulfilled') {
        renderHero(portfolioR.value);
        renderPositions(portfolioR.value.positions);
      } else {
        var heroEl = document.getElementById('hero-content');
        heroEl.textContent = 'Could not load portfolio';
      }

      if (benchmarksR.status === 'fulfilled') renderBenchmarks(benchmarksR.value);
      if (historyR.status === 'fulfilled') renderTrades(historyR.value);
      if (costsR.status === 'fulfilled') renderCosts(costsR.value);
      if (brokerR.status === 'fulfilled') renderRecon(brokerR.value);

      renderRecs();

      btn.classList.remove('spinning');
      btn.textContent = 'REFRESH';
    });
  }

  window.loadAll = loadAll;

  // Init
  loadAll();
  setInterval(loadAll, 300000);

  // ---- Guided Tour (triggered by ?tour=1 from onboarding wizard) ----

  if (new URLSearchParams(window.location.search).has('tour')) {
    var TOUR_STEPS = [
      {
        target: '.panel-hero',
        title: 'Portfolio Overview',
        text: 'Your total portfolio value, P&L breakdown (total, unrealized, realized), cash, and invested capital. Updates in real-time.',
      },
      {
        target: '.panel-report',
        title: 'Report Card',
        text: 'How the bot compares against major market indices (SPY, QQQ, etc.) since inception. Annualized returns and a verdict.',
      },
      {
        target: '.panel-recs',
        title: "Today's Picks",
        text: "Claude's daily recommendations appear here each morning after Phase 1 runs. You'll see buy/sell signals with confidence and reasoning.",
      },
      {
        target: '.panel-positions',
        title: 'Open Positions',
        text: 'Every stock you currently hold with gain/loss, entry details, and the original buy thesis. Sorted by P&L.',
      },
      {
        target: '#costs-content',
        title: 'Token Costs',
        text: 'Claude API cost tracking. Today\'s spend vs $1/day target, plus 7-day, 30-day, and all-time totals.',
      },
      {
        target: '.topbar-status',
        title: 'Operational Status',
        text: 'API health indicators and broker reconciliation. Navigation links are in the tab bar above.',
      },
    ];

    var tourStep = 0;

    var overlay = document.createElement('div');
    overlay.id = 'tour-overlay';
    document.body.appendChild(overlay);

    var tooltip = document.createElement('div');
    tooltip.id = 'tour-tooltip';
    document.body.appendChild(tooltip);

    var style = document.createElement('style');
    style.textContent = [
      '#tour-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.65); z-index:9998; }',
      '#tour-tooltip { position:absolute; z-index:10000; background:var(--surface); border:1px solid var(--amber); border-radius:6px; padding:16px; max-width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }',
      '#tour-tooltip .tour-t-title { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--text-hi); margin-bottom:4px; }',
      '#tour-tooltip .tour-t-text { font-size:12px; color:var(--text); line-height:1.6; margin-bottom:12px; }',
      '#tour-tooltip .tour-t-nav { display:flex; justify-content:space-between; align-items:center; }',
      '#tour-tooltip .tour-t-counter { font-size:10px; color:var(--text-dim); }',
      '#tour-tooltip .tour-t-btn { font-family:var(--mono); font-size:11px; padding:5px 12px; border-radius:4px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); transition:all 0.15s; }',
      '#tour-tooltip .tour-t-btn:hover { border-color:var(--amber); color:var(--amber); }',
      '#tour-tooltip .tour-t-btn.primary { background:var(--amber); color:var(--bg); border-color:var(--amber); font-weight:600; }',
      '#tour-tooltip .tour-t-btn.primary:hover { background:#d4901a; }',
      '.tour-highlight { position:relative; z-index:9999; box-shadow:0 0 0 3px rgba(232,160,48,0.4), 0 0 16px rgba(232,160,48,0.12); border-radius:4px; }',
    ].join('\n');
    document.head.appendChild(style);

    function showTourStep(idx) {
      var prev = document.querySelector('.tour-highlight');
      if (prev) prev.classList.remove('tour-highlight');

      if (idx >= TOUR_STEPS.length) {
        overlay.remove();
        tooltip.remove();
        var url = new URL(window.location);
        url.searchParams.delete('tour');
        window.history.replaceState({}, '', url);
        return;
      }

      var step = TOUR_STEPS[idx];
      var target = document.querySelector(step.target);
      if (!target) { showTourStep(idx + 1); return; }

      target.classList.add('tour-highlight');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });

      tooltip.textContent = '';
      var title = document.createElement('div');
      title.className = 'tour-t-title';
      title.textContent = step.title;
      tooltip.appendChild(title);

      var text = document.createElement('div');
      text.className = 'tour-t-text';
      text.textContent = step.text;
      tooltip.appendChild(text);

      var nav = document.createElement('div');
      nav.className = 'tour-t-nav';

      var counter = document.createElement('span');
      counter.className = 'tour-t-counter';
      counter.textContent = (idx + 1) + ' / ' + TOUR_STEPS.length;
      nav.appendChild(counter);

      var btnGroup = document.createElement('div');
      btnGroup.style.cssText = 'display:flex;gap:6px';

      if (idx > 0) {
        var backBtn = document.createElement('button');
        backBtn.className = 'tour-t-btn';
        backBtn.textContent = 'Back';
        backBtn.addEventListener('click', function() { showTourStep(idx - 1); });
        btnGroup.appendChild(backBtn);
      }

      var skipBtn = document.createElement('button');
      skipBtn.className = 'tour-t-btn';
      skipBtn.textContent = 'Skip';
      skipBtn.addEventListener('click', function() { showTourStep(TOUR_STEPS.length); });
      btnGroup.appendChild(skipBtn);

      var nextBtn = document.createElement('button');
      nextBtn.className = 'tour-t-btn primary';
      nextBtn.textContent = idx === TOUR_STEPS.length - 1 ? 'Finish' : 'Next';
      nextBtn.addEventListener('click', function() { showTourStep(idx + 1); });
      btnGroup.appendChild(nextBtn);

      nav.appendChild(btnGroup);
      tooltip.appendChild(nav);

      setTimeout(function() {
        var rect = target.getBoundingClientRect();
        var scrollY = window.scrollY || window.pageYOffset;
        tooltip.style.top = (rect.bottom + scrollY + 10) + 'px';
        tooltip.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 340)) + 'px';
      }, 100);
    }

    setTimeout(function() { showTourStep(0); }, 1500);
  }

})();
</script>
</body>
</html>
