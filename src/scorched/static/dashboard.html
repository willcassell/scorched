<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRADEBOT // DASHBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #0f1217;
    --border:   #253040;
    --border2:  #344558;
    --text:     #b8cce0;
    --text-dim: #6a8099;
    --text-hi:  #e8f2fc;
    --amber:    #e8a030;
    --amber-dim:#7a5018;
    --green:    #2ec87a;
    --green-dim:#134d30;
    --red:      #e84040;
    --red-dim:  #5a1818;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --fs-base: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: var(--fs-base);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.fs-s { zoom: 0.85; }
  body.fs-m { zoom: 1; }
  body.fs-l { zoom: 1.2; }
  body.fs-xl { zoom: 1.4; }
  body.fs-xxl { zoom: 1.65; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-size:15px; font-weight: 600; color: var(--amber); letter-spacing: 0.15em; text-transform: uppercase; }
  .logo span { color: var(--text-dim); font-weight: 300; }
  .status-pill { display: flex; align-items: center; gap: 6px; font-size:12px; color: var(--text-dim); letter-spacing: 0.1em; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .status-dot.offline { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .topbar-right { display: flex; align-items: center; gap: 16px; font-size:13px; color: var(--text-dim); }
  .refresh-btn {
    background: none; border: 1px solid var(--border2); color: var(--text);
    font-family: var(--mono); font-size:12px; padding: 4px 10px;
    cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s;
  }
  .refresh-btn:hover { border-color: var(--amber); color: var(--amber); }
  .refresh-btn.spinning { opacity: 0.5; pointer-events: none; }
  .grid {
    display: grid;
    grid-template-columns: 270px 1fr 250px;
    grid-template-rows: auto auto auto auto 1fr;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 41px);
  }
  .panel { background: var(--bg); padding: 10px 12px; position: relative; }
  .panel-label {
    font-size:11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 7px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-label::after { content:''; flex:1; height:1px; background:var(--border); margin-left:10px; }
  .panel-performance { grid-column: 1; grid-row: 1; }
  .big-number { font-size:30px; font-weight: 600; color: var(--text-hi); line-height: 1; letter-spacing: -0.02em; margin-bottom: 4px; }
  .big-label { font-size:11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-row { display:flex; justify-content:space-between; align-items:baseline; padding:3px 0; border-bottom:1px solid var(--border); }
  .stat-row:last-child { border-bottom:none; }
  .stat-key { color: var(--text-dim); font-size:12px; letter-spacing: 0.05em; }
  .stat-val { font-size:14px; color: var(--text-hi); font-weight: 500; }
  .gain { color: var(--green); }
  .loss { color: var(--red); }
  .return-bar { margin: 14px 0 4px; height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
  .return-bar-fill { height:100%; border-radius:2px; transition:width 0.8s ease; background:var(--green); }
  .return-bar-fill.negative { background: var(--red); }
  .panel-positions { grid-column: 2; grid-row: 1 / 3; }
  .analysis-text { font-family: var(--sans); font-size:13px; color: var(--text); line-height: 1.7; font-weight: 300; white-space: pre-wrap; }
  .analysis-section { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .analysis-section:last-child { border-bottom: none; margin-bottom: 0; }
  .analysis-section-label { font-size:11px; letter-spacing: 0.12em; color: var(--amber); text-transform: uppercase; font-family: var(--mono); margin-bottom: 5px; display: block; }
  .candidates-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .candidate-chip { font-size:12px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 7px; border: 1px solid var(--border2); color: var(--text-hi); background: rgba(200,216,232,0.04); }
  .position-card { border:1px solid var(--border); padding:8px 10px; margin-bottom:6px; position:relative; transition:border-color 0.15s; }
  .position-card:hover { border-color: var(--border2); }
  .position-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--green); }
  .pos-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .pos-symbol { font-size:20px; font-weight:600; color:var(--text-hi); letter-spacing:0.05em; }
  .pos-action-badge { font-size:11px; letter-spacing:0.15em; padding:2px 6px; }
  .pos-action-badge.short-term { border:1px solid var(--amber-dim); color:var(--amber); background:rgba(232,160,48,0.06); }
  .pos-action-badge.long-term  { border:1px solid var(--green-dim); color:var(--green); background:rgba(46,200,122,0.06); }
  .pos-meta { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
  .pos-meta-key { font-size:11px; color:var(--text-dim); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
  .pos-meta-val { font-size:14px; color:var(--text-hi); font-weight:500; }
  .pos-reasoning { font-family:var(--sans); font-size:13px; color:var(--text); line-height:1.6; padding-top:8px; border-top:1px solid var(--border); font-weight:300; }
  .pos-reasoning-label { color:var(--text-dim); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; font-family:var(--mono); font-weight:400; display:block; margin-bottom:3px; }
  .tax-tag { display:inline-block; font-size:11px; padding:1px 5px; letter-spacing:0.08em; margin-top:4px; }
  .tax-tag.short_term { background:var(--amber-dim); color:var(--amber); border:1px solid var(--amber-dim); }
  .tax-tag.long_term { background:var(--green-dim); color:var(--green); border:1px solid var(--green-dim); }
  .empty-state { color:var(--text-dim); font-size:13px; padding:24px 0; text-align:center; border:1px dashed var(--border); }
  .panel-closed { grid-column: 2; grid-row: 3 / 6; overflow-y: auto; }
  .closed-row { display:grid; grid-template-columns:60px 40px 1fr 80px 70px; gap:8px; align-items:center; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .closed-row:last-child { border-bottom:none; }
  .closed-symbol { font-weight:600; color:var(--text-hi); letter-spacing:0.05em; }
  .closed-action { font-size:11px; letter-spacing:0.1em; padding:1px 4px; }
  .closed-action.sell { color:var(--red); border:1px solid var(--red-dim); background:rgba(232,64,64,0.05); }
  .closed-action.buy { color:var(--green); border:1px solid var(--green-dim); background:rgba(46,200,122,0.05); }
  .closed-date { color:var(--text-dim); font-size:12px; }
  .closed-gain { font-weight:500; text-align:right; }
  .closed-tax { font-size:11px; color:var(--text-dim); text-align:right; letter-spacing:0.05em; }
  .panel-tax { grid-column: 3; grid-row: 1; }
  .tax-block { margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .tax-block:last-child { border-bottom:none; margin-bottom:0; }
  .tax-block-label { font-size:11px; letter-spacing:0.12em; color:var(--text-dim); text-transform:uppercase; margin-bottom:6px; }
  .tax-block-row { display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .panel-costs { grid-column: 3; grid-row: 2 / 6; }
  .panel-recs { grid-column: 1; grid-row: 2 / 6; overflow-y: auto; }
  .strategy-settings-btn {
    display: inline-block; padding: 4px 12px;
    border: 1px solid var(--amber-dim); border-radius: 3px;
    color: var(--amber); font-family: var(--mono); font-size:12px;
    letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase;
    transition: all 0.15s;
  }
  .strategy-settings-btn:hover { border-color: var(--amber); background: rgba(232,160,48,0.06); }
  .api-health { display: flex; align-items: center; gap: 10px; font-size: 11px; }
  .api-health-badge {
    display: flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 4px;
  }
  .api-health-badge .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .api-health-badge .dot.green { background: var(--green); }
  .api-health-badge .dot.yellow { background: #eab308; }
  .api-health-badge .dot.red { background: var(--red); }
  .api-health-badge .count { font-weight: 600; }
  .api-health-badge .count.green { color: var(--green); }
  .api-health-badge .count.yellow { color: #eab308; }
  .api-health-badge .count.red { color: var(--red); }
  .api-health-badge .sep { color: var(--text-dim); }
  .system-link {
    color: var(--amber); text-decoration: none; font-size: 10px;
    border: 1px solid var(--amber); padding: 2px 8px; border-radius: 3px;
    letter-spacing: 0.1em; transition: all 0.15s;
  }
  .system-link:hover { background: var(--amber); color: var(--bg); }
  .cost-bar-wrap { margin: 6px 0 10px; }
  .cost-bar-track { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-top: 4px; }
  .cost-bar-fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.6s ease; }
  .cost-breakdown { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .cost-chip { font-size:11px; color: var(--text-dim); letter-spacing: 0.06em; }
  .rec-card { border:1px solid var(--border); padding:8px; margin-bottom:6px; }
  .rec-card.buy { border-left:2px solid var(--green); }
  .rec-card.sell { border-left:2px solid var(--red); }
  .rec-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .rec-symbol { font-size:17px; font-weight:600; color:var(--text-hi); }
  .rec-badge { font-size:11px; letter-spacing:0.15em; padding:2px 6px; }
  .rec-badge.buy { color:var(--green); border:1px solid var(--green-dim); background:rgba(46,200,122,0.06); }
  .rec-badge.sell { color:var(--red); border:1px solid var(--red-dim); background:rgba(232,64,64,0.06); }
  .rec-price-row { display:flex; justify-content:space-between; margin-bottom:6px; }
  .rec-price { font-size:14px; color:var(--text-hi); }
  .rec-price-label { color:var(--text-dim); font-size:11px; }
  .rec-confidence { font-size:11px; letter-spacing:0.08em; }
  .rec-confidence.high { color:var(--green); }
  .rec-confidence.medium { color:var(--amber); }
  .rec-confidence.low { color:var(--red); }
  .rec-reasoning { font-family:var(--sans); font-size:12px; color:var(--text); line-height:1.55; font-weight:300; margin-bottom:5px; }
  .rec-risk { font-size:11px; color:var(--text-dim); font-family:var(--sans); font-style:italic; }
  .rec-status { display:inline-block; font-size:11px; padding:1px 5px; letter-spacing:0.08em; margin-top:6px; }
  .rec-status.pending { color:var(--amber); border:1px solid var(--amber-dim); background:rgba(232,160,48,0.05); }
  .rec-status.confirmed { color:var(--green); border:1px solid var(--green-dim); background:rgba(46,200,122,0.05); }
  .rec-status.rejected { color:var(--text-dim); border:1px solid var(--border); }
  .skeleton { background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:2px; display:inline-block; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .sk-line { height:12px; margin-bottom:6px; }
  .sk-big { height:32px; margin-bottom:8px; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .loaded { animation: fadeIn 0.25s ease forwards; }
  .report-card { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .report-card-header { font-size:11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .report-card-period { font-size:11px; color: var(--text-dim); letter-spacing: 0.05em; margin-bottom: 4px; }
  .report-card-days { font-size:13px; color: var(--amber); font-weight: 500; letter-spacing: 0.05em; margin-bottom: 10px; }
  .rc-col-header { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; padding: 0 0 4px; margin-bottom: 2px; border-bottom: 1px solid var(--border2); }
  .rc-col-label { font-size:10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .rc-col-label.right { text-align: right; }
  .rc-row { display: grid; grid-template-columns: 1fr auto auto; align-items: baseline; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .rc-row:last-child { border-bottom: none; }
  .rc-row.portfolio-row { margin-bottom: 4px; padding-bottom: 6px; border-bottom: 1px solid var(--border2); background: rgba(232,160,48,0.04); margin: 0 -6px; padding: 6px; }
  .rc-name { font-size:12px; color: var(--text-dim); letter-spacing: 0.04em; }
  .rc-name.portfolio-name { color: var(--amber); font-weight: 600; font-size: 13px; }
  .rc-ret { font-size:13px; font-weight: 500; text-align: right; min-width: 52px; }
  .rc-delta { font-size:11px; text-align: right; min-width: 62px; letter-spacing: 0.04em; font-weight: 500; }
  .rc-delta.beating { color: var(--green); }
  .rc-delta.lagging { color: var(--red); }
  .zoom-select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: var(--mono); font-size: 11px; padding: 3px 6px;
    cursor: pointer; letter-spacing: 0.06em;
    appearance: auto;
  }
  .zoom-select:focus { border-color: var(--amber); outline: none; }

  /* ── Mobile Responsive ─────────────────────────────────────────────────── */
  @media (max-width: 1024px) {
    .grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
    }
    .panel-performance { grid-column: 1; grid-row: auto; }
    .panel-tax { grid-column: 2; grid-row: auto; }
    .panel-costs { grid-column: 1; grid-row: auto; }
    .panel-recs { grid-column: 2; grid-row: auto; }
    .panel-positions { grid-column: 1 / -1; grid-row: auto; }
    .panel-closed { grid-column: 1 / -1; grid-row: auto; }
    .topbar { flex-wrap: wrap; gap: 8px; }
    .topbar-right { flex-wrap: wrap; }
  }
  @media (max-width: 640px) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .panel-performance,
    .panel-tax,
    .panel-costs,
    .panel-recs,
    .panel-positions,
    .panel-closed { grid-column: 1; grid-row: auto; }
    .topbar {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
    }
    .topbar-left { width: 100%; justify-content: space-between; }
    .api-health { width: 100%; flex-wrap: wrap; gap: 6px; }
    .topbar-right { width: 100%; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
    .pos-meta { grid-template-columns: 1fr 1fr; }
    .closed-row { grid-template-columns: 50px 35px 1fr 70px; font-size: 12px; }
    .closed-tax { display: none; }
    .big-number { font-size: 24px; }
    .logo { font-size: 13px; }
    .panel { padding: 10px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div class="logo">TRADEBOT <span>// <span id="broker-label">---</span></span></div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">CONNECTING</span>
    </div>
  </div>
  <div class="api-health" id="api-health">
    <div class="api-health-badge">
      <span style="color:var(--text-dim)">APIs</span>
      <span class="dot green"></span><span class="count green" id="api-green">-</span>
      <span class="sep">/</span>
      <span class="dot yellow"></span><span class="count yellow" id="api-yellow">-</span>
      <span class="sep">/</span>
      <span class="dot red"></span><span class="count red" id="api-red">-</span>
    </div>
    <a href="/system" class="system-link">SYSTEM</a>
    <a href="/analysis" class="system-link" style="border-color:var(--amber-dim);color:var(--amber)">ANALYSIS</a>
    <a href="/onboarding" class="system-link" style="border-color:var(--green-dim);color:var(--green)">SETUP</a>
  </div>
  <div class="topbar-right">
    <select class="zoom-select" id="zoomSelect" onchange="setFontSize(this.value)">
      <option value="s">Small</option>
      <option value="m">Medium</option>
      <option value="l">Large</option>
      <option value="xl">X-Large</option>
      <option value="xxl">XX-Large</option>
    </select>
    <span id="clock"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↺ REFRESH</button>
    <a href="/strategy" class="strategy-settings-btn">Strategy Settings</a>
  </div>
</header>

<div class="grid">
  <div class="panel panel-performance">
    <div class="panel-label">Portfolio</div>
    <div id="perf-content">
      <div class="skeleton sk-big" style="width:80%"></div>
      <div class="skeleton sk-line" style="width:50%"></div>
      <div class="skeleton sk-line" style="width:100%"></div>
      <div class="skeleton sk-line" style="width:100%"></div>
    </div>
    <div id="benchmarks-content"></div>
  </div>

  <div class="panel panel-positions">
    <div class="panel-label">Open Positions</div>
    <div id="positions-content">
      <div class="skeleton sk-line" style="width:100%"></div>
      <div class="skeleton sk-line" style="width:85%"></div>
      <div class="skeleton sk-line" style="width:90%"></div>
    </div>
  </div>

  <div class="panel panel-tax">
    <div class="panel-label">Tax Summary</div>
    <div id="tax-content">
      <div class="skeleton sk-line" style="width:100%"></div>
      <div class="skeleton sk-line" style="width:80%"></div>
    </div>
  </div>

  <div class="panel panel-recs">
    <div class="panel-label">Today's Picks</div>
    <div id="recs-content">
      <div class="skeleton sk-line" style="width:100%"></div>
      <div class="skeleton sk-line" style="width:90%"></div>
    </div>
  </div>

  <div class="panel panel-closed">
    <div class="panel-label">Recent Closed</div>
    <div id="closed-content">
      <div class="skeleton sk-line" style="width:100%"></div>
      <div class="skeleton sk-line" style="width:85%"></div>
      <div class="skeleton sk-line" style="width:70%"></div>
    </div>
  </div>

  <div class="panel panel-costs">
    <div class="panel-label">Token Costs</div>
    <div id="costs-content">
      <div class="skeleton sk-line" style="width:80%"></div>
      <div class="skeleton sk-line" style="width:60%"></div>
    </div>
  </div>


</div>

<script>
// NOTE: All API-sourced strings are passed through escapeHtml() before any
// innerHTML assignment, preventing XSS from untrusted server content.

const API = '/api/v1';

// ── Font Size Toggle ─────────────────────────────────────────────────────────
function setFontSize(size) {
  document.body.classList.remove('fs-s', 'fs-m', 'fs-l', 'fs-xl', 'fs-xxl');
  document.body.classList.add('fs-' + size);
  const sel = document.getElementById('zoomSelect');
  if (sel) sel.value = size;
  localStorage.setItem('tradebot-font-size', size);
}
(function() {
  setFontSize(localStorage.getItem('tradebot-font-size') || 'm');
})();

// ── Safety: escape all user/API content before DOM insertion ─────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Formatters ───────────────────────────────────────────────────────────────
const fmt$ = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  return '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
};
const fmtGain$ = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  const sign = v < 0 ? '-' : '+';
  return sign + '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
};
const fmtPct = (n) => {
  const v = parseFloat(n);
  if (isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
};
const gainCls = (n) => parseFloat(n) >= 0 ? 'gain' : 'loss';
const fmtDate = (d) => {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'2-digit'});
};

async function apiFetch(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

// ── Open Positions ───────────────────────────────────────────────────────────
async function renderPositions(positions) {
  const el = document.getElementById('positions-content');
  el.className = 'loaded';

  if (!positions.length) {
    el.textContent = '';
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.textContent = 'NO OPEN POSITIONS';
    el.appendChild(e);
    return;
  }

  // Fetch buy reasoning from recent sessions
  const reasoningMap = {};
  try {
    const today = new Date().toISOString().slice(0,10);
    const sessions = await apiFetch('/recommendations?limit=5');
    for (const s of sessions) {
      const detail = await apiFetch('/recommendations/' + s.id);
      detail.recommendations.forEach(r => {
        if (r.action === 'buy' && !reasoningMap[r.symbol]) {
          reasoningMap[r.symbol] = r.reasoning;
        }
      });
      if (positions.every(p => reasoningMap[p.symbol])) break;
    }
  } catch(e) {}

  el.textContent = '';

  positions.forEach(pos => {
    const gain = parseFloat(pos.unrealized_gain);
    const card = document.createElement('div');
    card.className = 'position-card';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'pos-header';
    const sym = document.createElement('div');
    sym.className = 'pos-symbol';
    sym.textContent = pos.symbol;
    const badge = document.createElement('span');
    const isLongTerm = pos.tax_category === 'long_term';
    badge.className = 'pos-action-badge ' + (isLongTerm ? 'long-term' : 'short-term');
    badge.textContent = isLongTerm ? 'LONG-TERM' : 'SHORT-TERM';
    hdr.appendChild(sym);
    hdr.appendChild(badge);
    card.appendChild(hdr);

    // Meta grid
    const meta = document.createElement('div');
    meta.className = 'pos-meta';
    const metaItems = [
      ['Price', fmt$(pos.current_price)],
      ['Mkt Value', fmt$(pos.market_value)],
      ['P&L', fmtGain$(gain) + ' (' + fmtPct(pos.unrealized_gain_pct) + ')', gainCls(gain)],
      ['Shares', parseFloat(pos.shares).toFixed(2)],
      ['Avg Cost', fmt$(pos.avg_cost_basis)],
      ['Held', pos.days_held + 'd'],
    ];
    metaItems.forEach(([k, v, cls]) => {
      const item = document.createElement('div');
      item.className = 'pos-meta-item';
      const key = document.createElement('div');
      key.className = 'pos-meta-key';
      key.textContent = k;
      const val = document.createElement('div');
      val.className = 'pos-meta-val' + (cls ? ' ' + cls : '');
      val.textContent = v;
      item.appendChild(key);
      item.appendChild(val);
      meta.appendChild(item);
    });
    card.appendChild(meta);

    // Reasoning
    const reasoning = reasoningMap[pos.symbol];
    if (reasoning) {
      const box = document.createElement('div');
      box.className = 'pos-reasoning';
      const lbl = document.createElement('span');
      lbl.className = 'pos-reasoning-label';
      lbl.textContent = 'Buy Thesis';
      const txt = document.createTextNode(reasoning);
      box.appendChild(lbl);
      box.appendChild(txt);
      card.appendChild(box);
    }

    // Tax footer (est. tax note on gains only)
    if (gain > 0) {
      const footer = document.createElement('div');
      footer.style.marginTop = '8px';
      const taxNote = document.createElement('span');
      taxNote.style.cssText = 'font-size:11px;color:var(--text-dim)';
      taxNote.textContent = 'est. tax: ' + fmt$(pos.estimated_tax_on_gain) + ' · post-tax: ' + fmtGain$(pos.estimated_post_tax_gain);
      footer.appendChild(taxNote);
      card.appendChild(footer);
    }
    el.appendChild(card);
  });
}

    if (!sessions.length) {
      const e = document.createElement('div');
      e.className = 'empty-state';
      e.textContent = 'No analysis yet today';
      el.appendChild(e);
      return;
    }

    // Fetch full session to get analysis_text
    const detail = await apiFetch('/recommendations/' + sessions[0].id + '/analysis');

      const e = document.createElement('div');

      el.appendChild(e);
      return;
    }

    // Split on [THINKING] / [ANALYSIS] markers if present

    // Render analysis section

    analysisLbl.className = 'analysis-section-label';

    analysisBody.className = 'analysis-text';
    analysisBody.textContent = analysis;
    analysisSection.appendChild(analysisLbl);
    analysisSection.appendChild(analysisBody);
    el.appendChild(analysisSection);

    // Render thinking section if present (collapsed by default)
    if (thinking) {
      const thinkSection = document.createElement('div');
      thinkSection.className = 'analysis-section';
      const thinkLbl = document.createElement('span');

      thinkLbl.style.color = 'var(--text-dim)';

      };
      const thinkHeader = document.createElement('div');

      thinkHeader.appendChild(thinkLbl);
      thinkHeader.appendChild(thinkToggle);
      thinkSection.appendChild(thinkHeader);

    el.className = 'loaded';

    err.style.color = 'var(--text-dim)';
    err.textContent = 'Analysis unavailable';

// ── Token Costs ───────────────────────────────────────────────────────────────
function renderCosts(costs) {
  const el = document.getElementById('costs-content');
  el.className = 'loaded';
  el.textContent = '';

  const DAILY_TARGET = 1.00;

  const periods = [
    ['Today', costs.today],
    ['7-day', costs.last_7_days],
    ['30-day', costs.last_30_days],
  ];

  periods.forEach(([label, data]) => {
    const cost = data.total_cost_usd || 0;
    const isToday = label === 'Today';
    const pct = isToday ? Math.min((cost / DAILY_TARGET) * 100, 100) : null;

    const wrap = document.createElement('div');
    wrap.className = 'cost-bar-wrap';
    wrap.style.paddingBottom = '8px';
    wrap.style.borderBottom = '1px solid var(--border)';
    wrap.style.marginBottom = '6px';

    const topRow = document.createElement('div');
    topRow.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline';
    const lbl = document.createElement('span');
    lbl.className = 'stat-key';
    lbl.textContent = label;
    const val = document.createElement('span');
    val.className = 'stat-val ' + (cost > DAILY_TARGET && isToday ? 'loss' : '');
    val.textContent = '$' + cost.toFixed(4);
    topRow.appendChild(lbl);
    topRow.appendChild(val);
    wrap.appendChild(topRow);

    if (isToday && pct !== null) {
      const track = document.createElement('div');
      track.className = 'cost-bar-track';
      const fill = document.createElement('div');
      fill.className = 'cost-bar-fill';
      fill.style.width = pct + '%';
      if (pct > 80) fill.style.background = 'var(--red)';
      track.appendChild(fill);
      wrap.appendChild(track);

      const hint = document.createElement('div');
      hint.style.cssText = 'font-size:11px;color:var(--text-dim);margin-top:2px';
      hint.textContent = pct.toFixed(0) + '% of $1.00/day target';
      wrap.appendChild(hint);
    }

    // Breakdown by call type
    if (data.by_call_type && Object.keys(data.by_call_type).length) {
      const breakdown = document.createElement('div');
      breakdown.className = 'cost-breakdown';
      Object.entries(data.by_call_type).forEach(([type, d]) => {
        const chip = document.createElement('span');
        chip.className = 'cost-chip';
        chip.textContent = type + ': $' + (d.cost_usd || 0).toFixed(4);
        breakdown.appendChild(chip);
      });
      wrap.appendChild(breakdown);
    }

    el.appendChild(wrap);
  });

  // All-time
  const allTime = document.createElement('div');
  allTime.className = 'stat-row';
  allTime.style.borderBottom = 'none';
  const atKey = document.createElement('span');
  atKey.className = 'stat-key';
  atKey.textContent = 'All-time';
  const atVal = document.createElement('span');
  atVal.className = 'stat-val';
  atVal.textContent = '$' + (costs.all_time.total_cost_usd || 0).toFixed(4);
  allTime.appendChild(atKey);
  allTime.appendChild(atVal);
  el.appendChild(allTime);
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  btn.textContent = '↺ LOADING';

  // Health check
  try {
    const h = await fetch('/health');
    const data = await h.json();
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (data.db === 'connected') {
      dot.classList.remove('offline');
      txt.textContent = 'LIVE';
    } else {
      dot.classList.add('offline');
      txt.textContent = 'DB ERROR';
    }
  } catch(e) {
    document.getElementById('status-dot').classList.add('offline');
    document.getElementById('status-text').textContent = 'OFFLINE';
  }

  // API health status bar
  try {
    const sh = await apiFetch('/system/health');
    document.getElementById('api-green').textContent = sh.summary?.green || 0;
    document.getElementById('api-yellow').textContent = sh.summary?.yellow || 0;
    document.getElementById('api-red').textContent = sh.summary?.red || 0;
    const bmode = sh.broker?.mode || 'paper';
    const modeLabel = {paper:'SIMULATED',alpaca_paper:'ALPACA PAPER',alpaca_live:'LIVE TRADING'}[bmode] || bmode.toUpperCase();
    document.getElementById('broker-label').textContent = modeLabel;
  } catch(e) {
    document.getElementById('api-green').textContent = '?';
  }

  const [portfolioR, historyR, taxR, costsR, benchmarksR] = await Promise.allSettled([
    apiFetch('/portfolio'),
    apiFetch('/portfolio/history?limit=10'),
    apiFetch('/portfolio/tax-summary'),
    apiFetch('/costs'),
    apiFetch('/portfolio/benchmarks'),
  ]);

  if (portfolioR.status === 'fulfilled') {
    renderPerformance(portfolioR.value);
    await renderPositions(portfolioR.value.positions);
  } else {
    ['perf-content','positions-content'].forEach(id => {
      const el = document.getElementById(id);
      el.textContent = 'Could not load: ' + (portfolioR.reason?.message || 'unknown error');
    });
  }

  if (benchmarksR.status === 'fulfilled') renderBenchmarks(benchmarksR.value);

  if (historyR.status === 'fulfilled') renderClosed(historyR.value);
  if (taxR.status === 'fulfilled') renderTax(taxR.value);
  if (costsR.status === 'fulfilled') renderCosts(costsR.value);

  await renderRecs();

  btn.classList.remove('spinning');
  btn.textContent = '↺ REFRESH';
}


loadAll();
setInterval(loadAll, 300000);

// ── Guided Tour (triggered by ?tour=1 from onboarding wizard) ────────────────

(function() {
  if (!new URLSearchParams(window.location.search).has('tour')) return;

  var TOUR_STEPS = [
    {
      target: '.panel-performance',
      title: 'Portfolio Overview',
      text: 'Your total portfolio value, cash balance, and return percentage. Updates in real-time as trades execute.',
      position: 'bottom',
    },
    {
      target: '.panel-positions',
      title: 'Open Positions',
      text: 'Every stock you currently hold, with buy thesis, gain/loss, and tax category. Empty until your first trade.',
      position: 'bottom',
    },
    {
      target: '.panel-recs',
      title: "Today's Picks",
      text: "Claude's daily recommendations appear here each morning after Phase 1 runs. You'll see buy/sell signals with confidence levels and reasoning.",
      position: 'bottom',
    },
    {
      target: '.panel-tax',
      title: 'Tax Summary',
      text: 'Running tally of short-term vs long-term gains, estimated tax liability, and after-tax returns.',
      position: 'bottom',
    },
    {
      target: '.panel-costs',
      title: 'Token Costs',
      text: 'How much the Claude API calls cost today, this week, and all-time. Typically $0.10-0.30/day.',
      position: 'bottom',
    },
    {
      target: '.api-health',
      title: 'API Health',
      text: 'Green/yellow/red indicators for all data sources. Click SYSTEM for detailed per-API monitoring.',
      position: 'below-header',
    },
  ];

  var tourStep = 0;

  // Build overlay elements
  var overlay = document.createElement('div');
  overlay.id = 'tour-overlay';
  document.body.appendChild(overlay);

  var tooltip = document.createElement('div');
  tooltip.id = 'tour-tooltip';
  document.body.appendChild(tooltip);

  // Inject tour CSS
  var style = document.createElement('style');
  style.textContent = [
    '#tour-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.65); z-index:9998; transition:opacity 0.3s; }',
    '#tour-tooltip { position:absolute; z-index:10000; background:#0f1217; border:1px solid #e8a030; border-radius:8px; padding:20px; max-width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }',
    '#tour-tooltip .tour-t-title { font-family:"IBM Plex Mono",monospace; font-size:14px; font-weight:600; color:#e8f2fc; margin-bottom:6px; }',
    '#tour-tooltip .tour-t-text { font-size:13px; color:#b8cce0; line-height:1.6; margin-bottom:14px; }',
    '#tour-tooltip .tour-t-nav { display:flex; justify-content:space-between; align-items:center; }',
    '#tour-tooltip .tour-t-counter { font-family:"IBM Plex Mono",monospace; font-size:11px; color:#6a8099; }',
    '#tour-tooltip .tour-t-btn { font-family:"IBM Plex Mono",monospace; font-size:12px; font-weight:500; padding:7px 18px; border-radius:5px; cursor:pointer; border:1px solid #253040; background:#0f1217; color:#b8cce0; transition:all 0.2s; }',
    '#tour-tooltip .tour-t-btn:hover { border-color:#e8a030; color:#e8a030; }',
    '#tour-tooltip .tour-t-btn.primary { background:#e8a030; color:#0a0c0f; border-color:#e8a030; font-weight:600; }',
    '#tour-tooltip .tour-t-btn.primary:hover { background:#d4901a; }',
    '.tour-highlight { position:relative; z-index:9999; box-shadow:0 0 0 4px rgba(232,160,48,0.4), 0 0 20px rgba(232,160,48,0.15); border-radius:8px; transition:box-shadow 0.3s; }',
  ].join('\n');
  document.head.appendChild(style);

  function showTourStep(idx) {
    // Remove previous highlight
    var prev = document.querySelector('.tour-highlight');
    if (prev) prev.classList.remove('tour-highlight');

    if (idx >= TOUR_STEPS.length) {
      // Tour complete
      overlay.remove();
      tooltip.remove();
      // Clean URL
      var url = new URL(window.location);
      url.searchParams.delete('tour');
      window.history.replaceState({}, '', url);
      return;
    }

    var step = TOUR_STEPS[idx];
    var target = document.querySelector(step.target);
    if (!target) { showTourStep(idx + 1); return; }

    target.classList.add('tour-highlight');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Build tooltip content
    tooltip.textContent = '';
    var title = document.createElement('div');
    title.className = 'tour-t-title';
    title.textContent = step.title;
    tooltip.appendChild(title);

    var text = document.createElement('div');
    text.className = 'tour-t-text';
    text.textContent = step.text;
    tooltip.appendChild(text);

    var nav = document.createElement('div');
    nav.className = 'tour-t-nav';

    var counter = document.createElement('span');
    counter.className = 'tour-t-counter';
    counter.textContent = (idx + 1) + ' / ' + TOUR_STEPS.length;
    nav.appendChild(counter);

    var btnGroup = document.createElement('div');
    btnGroup.style.cssText = 'display:flex;gap:8px';

    if (idx > 0) {
      var backBtn = document.createElement('button');
      backBtn.className = 'tour-t-btn';
      backBtn.textContent = 'Back';
      backBtn.addEventListener('click', function() { showTourStep(idx - 1); });
      btnGroup.appendChild(backBtn);
    }

    var skipBtn = document.createElement('button');
    skipBtn.className = 'tour-t-btn';
    skipBtn.textContent = 'Skip tour';
    skipBtn.addEventListener('click', function() { showTourStep(TOUR_STEPS.length); });
    btnGroup.appendChild(skipBtn);

    var nextBtn = document.createElement('button');
    nextBtn.className = 'tour-t-btn primary';
    nextBtn.textContent = idx === TOUR_STEPS.length - 1 ? 'Finish' : 'Next';
    nextBtn.addEventListener('click', function() { showTourStep(idx + 1); });
    btnGroup.appendChild(nextBtn);

    nav.appendChild(btnGroup);
    tooltip.appendChild(nav);

    // Position tooltip below target
    setTimeout(function() {
      var rect = target.getBoundingClientRect();
      var scrollY = window.scrollY || window.pageYOffset;
      tooltip.style.top = (rect.bottom + scrollY + 12) + 'px';
      tooltip.style.left = Math.max(12, Math.min(rect.left, window.innerWidth - 360)) + 'px';
    }, 100);
  }

  // Start tour after data loads
  setTimeout(function() { showTourStep(0); }, 1500);
})();
</script>
